services:
  web:
    env_file:
      - .env
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pivothire_app
    restart: always
    ports:
      - "3001:3000"
    depends_on:
      - db:
        condition: service_healthy

  db:
    image: postgres:15-alpine
    container_name: pivothire_db
    restart: always
    environment:
      POSTGRES_USER: pivothire_user
      POSTGRES_PASSWORD: pivothire_postgresdb_pswd202506
      POSTGRES_DB: pivothire_prod
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: